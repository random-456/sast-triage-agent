<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; script-src 'self'; style-src 'self'; img-src 'none'; connect-src 'none'; font-src 'none'; object-src 'none'; base-uri 'none'; form-action 'none'">
  <title>SAST Triage Session Log Viewer</title>
  <link rel="stylesheet" href="viewer.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar">
      <header>
        <h1>Session Log Viewer</h1>
      </header>
      <div id="file-loader">
        <label class="btn-primary" for="file-input">Browse...</label>
        <input id="file-input" type="file" accept=".jsonl" multiple>
        <div id="drop-zone">
          <span>or drop <code>.jsonl</code> files here</span>
        </div>
      </div>
      <nav id="session-list" aria-label="Loaded sessions"></nav>
      <footer>
        <div id="compare-launcher" hidden>
          <button id="compare-btn" type="button">Compare two sessions...</button>
        </div>
      </footer>
    </aside>
    <main id="main">
      <div id="tab-bar" role="tablist"></div>
      <section id="tab-content" aria-live="polite">
        <div class="empty-state">
          <p>Pick a <code>.jsonl</code> session log from the sidebar to begin.</p>
          <p class="muted">Logs live under <code>logs/</code> in the project root.</p>
        </div>
      </section>
    </main>
  </div>
  <dialog id="modal">
    <header>
      <h2 id="modal-title"></h2>
      <button id="modal-close" type="button" aria-label="Close">&times;</button>
    </header>
    <div id="modal-body"></div>
  </dialog>
  <script src="viewer.js"></script>
</body>
</html>
