<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAST Triage Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/custom.css?v=18">
</head>
<body class="h-screen overflow-hidden">
    <!-- App Container with inset margins -->
    <div class="app-container">
    <!-- Top Navigation Bar -->
    <div class="top-bar">
        <button id="sidebar-toggle" class="toggle-btn">
            <i class="fas fa-bars"></i>
        </button>
        <div class="app-title">
            SAST Triage Agent
        </div>
        <div class="top-bar-actions">
            <button id="settings-btn" class="settings-btn">
                <i class="fas fa-cog"></i>
            </button>
        </div>
    </div>

    <div class="layout" id="app-layout">
        <!-- Left Sidebar: Session History -->
        <aside id="sidebar" class="sidebar">
            <div class="p-4">
                <button id="btn-new-analysis" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-4 rounded mb-4">
                    <i class="fas fa-plus mr-2"></i>New Analysis
                </button>
                <h2 class="text-sm font-semibold text-gray-400 uppercase mb-3">History</h2>
                <div id="session-list" class="space-y-2">
                    <!-- Sessions will be populated here -->
                    <div class="text-gray-500 text-sm text-center py-8">
                        No sessions yet
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main">
            <!-- Screen 1: Project Input -->
            <div id="screen-project-input" class="flex-1 overflow-y-auto p-8">
                <div class="max-w-4xl mx-auto">
                    <h2 class="text-3xl font-bold mb-8">Start New Analysis</h2>

                    <div class="bg-gray-800 rounded-lg p-6 space-y-6">
                        <!-- Project Name -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Project Name</label>
                            <input type="text" id="input-project-name"
                                   class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 focus:outline-none focus:border-blue-500"
                                   placeholder="Enter Checkmarx project name">
                        </div>

                        <!-- Branch -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Branch</label>
                            <input type="text" id="input-branch"
                                   class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2 focus:outline-none focus:border-blue-500"
                                   placeholder="e.g., main, develop" value="default.SecurityPipeline">
                        </div>

                        <!-- Severity Filters -->
                        <div>
                            <label class="block text-sm font-medium mb-2">Severity</label>
                            <div class="grid grid-cols-4 gap-3">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="severity" value="CRITICAL" class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>CRITICAL</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="severity" value="HIGH" checked class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>HIGH</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="severity" value="MEDIUM" checked class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>MEDIUM</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="severity" value="LOW" class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>LOW</span>
                                </label>
                            </div>
                        </div>

                        <!-- State Filters -->
                        <div>
                            <label class="block text-sm font-medium mb-2">State</label>
                            <div class="grid grid-cols-2 gap-3">
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="state" value="TO_VERIFY" checked class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>TO_VERIFY</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="state" value="CONFIRMED" class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>CONFIRMED</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="state" value="NOT_EXPLOITABLE" class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>NOT_EXPLOITABLE</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="state" value="PROPOSED_NOT_EXPLOITABLE" class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>PROPOSED_NOT_EXPLOITABLE</span>
                                </label>
                                <label class="flex items-center space-x-2 cursor-pointer">
                                    <input type="checkbox" name="state" value="URGENT" class="form-checkbox bg-gray-700 border-gray-600">
                                    <span>URGENT</span>
                                </label>
                            </div>
                        </div>

                        <!-- Fetch Button -->
                        <div class="flex justify-end">
                            <button id="btn-fetch-findings"
                                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded">
                                <i class="fas fa-download mr-2"></i>Fetch Findings
                            </button>
                        </div>

                        <!-- Error/Loading Display -->
                        <div id="fetch-status" class="hidden"></div>
                    </div>
                </div>
            </div>

            <!-- Screen 2: Findings Display -->
            <div id="screen-findings-display" class="hidden flex-1 flex flex-col overflow-hidden">
                <!-- Header with Project Info -->
                <div class="topbar">
                    <div class="project" id="findings-project-name"></div>
                    <div class="meta">
                        <div class="meta-row" id="findings-retrieval"></div>
                        <div class="meta-row" id="findings-filters"></div>
                        <div class="meta-row">
                            <i class="fa-solid fa-code-branch"></i>
                            <span id="findings-branch"></span>
                            <span class="meta-separator"></span>
                            <a id="findings-github-link" href="#" target="_blank" class="meta-link"></a>
                        </div>
                        <div class="count" id="findings-count-badge">0 findings</div>
                    </div>
                </div>

                <!-- Findings Table -->
                <div class="table-wrapper">
                    <table class="w-full">
                        <thead class="bg-gray-800 sticky top-0">
                            <tr class="text-left text-sm text-gray-400">
                                <th class="p-3 w-12">
                                    <input type="checkbox" id="select-all-findings" class="form-checkbox">
                                </th>
                                <th class="p-3">Query Name</th>
                                <th class="p-3">CWE</th>
                                <th class="p-3">Severity</th>
                                <th class="p-3">State</th>
                                <th class="p-3">Category</th>
                                <th class="p-3">Language</th>
                            </tr>
                        </thead>
                        <tbody id="findings-table-body" class="text-sm">
                            <!-- Findings will be populated here -->
                        </tbody>
                    </table>
                </div>

                <!-- Action Bar -->
                <div class="bottom-bar">
                    <button id="btn-run-triage"
                            class="bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2 px-6 rounded disabled:opacity-50 disabled:cursor-not-allowed"
                            style="margin-left: auto;"
                            disabled>
                        <i class="fas fa-play mr-2"></i>Run Analysis
                    </button>
                </div>
            </div>
        </main>

        <!-- Right Detail Panel -->
        <aside id="detail-panel" class="detail-panel empty">
            <!-- Empty state (default) -->
            <div class="empty-state">
                <i class="fas fa-chart-pie empty-state-icon"></i>
                <div class="empty-state-text">
                    Select a finding to view details and analysis
                </div>
            </div>
        </aside>
    </div>
    </div><!-- End app-container -->

    <!-- Modals -->

    <!-- Settings Modal -->
    <div id="settings-modal" class="modal-overlay hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="text-lg font-semibold">Settings</h3>
                <button class="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium mb-2">Agent Model</label>
                        <select id="settings-model" class="w-full bg-gray-700 border border-gray-600 rounded px-4 py-2">
                            <option value="gemini-2.5-pro">gemini-2.5-pro</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button id="settings-save" class="bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded">
                    Save
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="/static/js/utils.js?v=1"></script>
    <script src="/static/js/state-manager.js?v=12"></script>
    <script src="/static/js/websocket-client.js?v=23"></script>
    <script src="/static/js/components/sidebar.js?v=10"></script>
    <script src="/static/js/components/findings-table.js?v=1"></script>
    <script src="/static/js/components/detail-panel.js?v=1"></script>
    <script src="/static/js/app.js?v=13"></script>
</body>
</html>
