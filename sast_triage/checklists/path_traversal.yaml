checklist_id: path_traversal
display_name: "Path Traversal (CWE-22)"

applies_to:
  cwes:
    - CWE-22
  query_names: []

evidence_required:
  - description: "Source is attacker-controlled and is used to build a filesystem path"
    examples:
      - "request parameter used as a filename, upload name, path segment"
  - description: "Sink is a filesystem operation that resolves the path"
    examples:
      - "file open/read/write, include/require, static file serving, ZIP entry extraction"
  - description: "Whether the path is canonicalized and then checked to stay within an allowed base directory, and whether that check is correct"
  - description: "How absolute paths and traversal sequences are handled, including encoded and platform-specific forms"

sanitizer_patterns:
  effective:
    - "canonicalize the resolved path, then verify it stays within an allowed base directory before use (language-agnostic principle)"
    - "File#getCanonicalPath().startsWith(canonicalBaseDir) with the base also canonicalized (Java)"
    - "resolve then confirm containment: path.resolve(base, input) and check it is still under base (Node.js); os.path.realpath under a base (Python)"
    - "use only the basename of the input joined to a fixed directory, discarding any directory components, where the basename extraction strips both forward-slash and backslash separators for the target OS (a POSIX-only split leaves Windows separators intact)"
    - "indirection: map an opaque id or allowlisted name to a known file, never using the raw input as a path"
  ineffective:
    - "blacklisting or stripping ../: bypassable with ....//, encoded (%2e%2e%2f), backslashes, absolute paths or null bytes"
    - "a single non-recursive replace of ../ : ....// collapses back to ../ after one pass"
    - "containment check performed before canonicalization, so ../ has not yet been resolved"
    - "checking startsWith on non-canonical strings, which a symlink or .. can defeat"
    - "allowing absolute paths or drive-letter / UNC prefixes to pass through"
    - "extracting an archive without canonicalizing each entry: in archive extraction (zip-slip) the entry name is the attacker-controlled value, so every destination base.resolve(entryName) must be canonicalized and confirmed under the base before writing; treating the archive as trusted because it was read from disk is not a defense"

investigation_guidance: |
  A correct defense has two parts that must both be present: canonicalize the
  full path (resolving .., symlinks and encodings), then verify the canonical
  result is inside the intended base directory. Missing either part leaves the
  finding exploitable. A containment check done before canonicalization is
  ineffective because the traversal has not yet been resolved. The same
  canonical path must be used for both the check and the file operation: a path
  re-resolved afterwards, or a symlink inside the base directory, can still
  escape between check and use.

  Treat filter-based defenses as INEFFECTIVE. Stripping or rejecting ../ is
  defeated by ....// (which collapses to ../ after a single non-recursive
  replace), by URL or double encoding, by backslashes on Windows, by absolute
  paths and historically by null bytes. If the code merely searches for ".."
  and does not canonicalize-then-contain, lean CONFIRMED.

  Also check whether the input can be an absolute path or a UNC/drive-prefixed
  path, which bypasses naive prefix joins entirely. The strongest pattern maps
  an allowlisted identifier to a known file: that is likely NOT_EXPLOITABLE.
  Reducing the input to a basename joined to a fixed directory is also strong,
  but only when the basename extraction strips separators for the target OS
  (a POSIX-only split leaves Windows backslashes intact). Verify any check
  applies to the same value that reaches the sink, not a different copy.

common_false_positive_patterns: |
  The code canonicalizes and then verifies containment within a base directory
  before the filesystem call. Only the basename is used (with a separator-correct
  basename for the target OS) and all directory components are discarded. The
  input is an allowlisted identifier mapped to a known file rather than a raw
  path. The path is not actually influenced by user input (fixed, or derived
  from configuration the operator controls, not tenant- or API-settable
  settings). The code path is test or fixture code.
